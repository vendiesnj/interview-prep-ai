# fly.toml app configuration file generated for signal-browser on 2026-03-25T12:38:00-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'signal-browser'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.browser'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
