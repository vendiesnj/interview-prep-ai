<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Career Tracker</title>
  <style>
    /* ---- Reset & base ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      overflow-x: hidden;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #2563eb 0%, #38bdf8 100%);
      padding: 18px 20px 16px;
      color: #fff;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.22);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.82;
    }

    /* Connection badge */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.18);
      letter-spacing: 0.02em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80; /* green = connected */
    }

    .status-dot.disconnected { background: #fbbf24; }

    /* ---- Stats row ---- */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: #e2e8f0;
      border-top: 1px solid rgba(255,255,255,0.2);
      margin-top: 14px;
      border-radius: 10px;
      overflow: hidden;
    }

    .stat-cell {
      background: rgba(255,255,255,0.15);
      padding: 10px 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      color: #fff;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.78);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ---- Content area ---- */
    .content {
      padding: 16px 16px 0;
    }

    /* ---- Section heading ---- */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    /* ---- Task list ---- */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 168px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .task-check {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #16a34a;
      margin-top: 1px;
    }

    .task-info { flex: 1; min-width: 0; }

    .task-name {
      font-size: 12px;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-meta {
      font-size: 10px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .task-stage {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-right: 4px;
    }

    .stage-pre_college    { background: #fef9c3; color: #a16207; }
    .stage-during_college { background: #dbeafe; color: #1d4ed8; }
    .stage-post_college   { background: #f3e8ff; color: #7e22ce; }

    .empty-state {
      text-align: center;
      padding: 20px 12px;
      color: #94a3b8;
      font-size: 12px;
      background: #fff;
      border: 1px dashed #e2e8f0;
      border-radius: 8px;
    }

    .empty-state-icon { font-size: 24px; margin-bottom: 6px; }

    /* ---- Primary action button ---- */
    .btn-primary {
      display: block;
      width: 100%;
      margin: 14px 0 0;
      padding: 10px;
      background: linear-gradient(135deg, #2563eb 0%, #38bdf8 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-primary:hover  { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    /* ---- Connect account button ---- */
    .btn-connect {
      display: block;
      width: 100%;
      margin: 8px 0 0;
      padding: 9px;
      background: transparent;
      color: #2563eb;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      border: 1.5px solid #93c5fd;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-connect:hover { background: #eff6ff; border-color: #2563eb; }

    /* ---- Settings panel ---- */
    .settings {
      margin-top: 14px;
      padding: 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }

    .settings label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 5px;
    }

    .settings-row {
      display: flex;
      gap: 6px;
    }

    .settings input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      font-size: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      outline: none;
      color: #1e293b;
      transition: border-color 0.15s;
    }

    .settings input[type="text"]:focus { border-color: #2563eb; }

    .btn-save {
      padding: 7px 14px;
      background: #2563eb;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-save:hover  { background: #1d4ed8; }

    .save-feedback {
      font-size: 11px;
      color: #16a34a;
      margin-top: 5px;
      min-height: 14px;
      transition: opacity 0.3s;
    }

    /* ---- Footer ---- */
    .footer {
      padding: 12px 16px 14px;
      text-align: center;
      font-size: 10px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-mark">S</div>
        <div>
          <div class="logo-text">Signal</div>
          <div class="logo-sub">Career Tracker</div>
        </div>
      </div>
      <div class="status-badge" id="statusBadge">
        <div class="status-dot disconnected" id="statusDot"></div>
        <span id="statusText">Not connected</span>
      </div>
    </div>

    <!-- Today's stats -->
    <div class="stats">
      <div class="stat-cell">
        <div class="stat-value" id="statSites">—</div>
        <div class="stat-label">Sites visited</div>
      </div>
      <div class="stat-cell">
        <div class="stat-value" id="statTime">—</div>
        <div class="stat-label">Min tracked</div>
      </div>
      <div class="stat-cell">
        <div class="stat-value" id="statTasks">—</div>
        <div class="stat-label">Tasks done</div>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="content">

    <!-- Completed tasks -->
    <p class="section-title" style="margin-top: 2px;">Recently auto-completed</p>
    <ul class="task-list" id="taskList">
      <!-- Populated by popup.js -->
    </ul>

    <!-- Dashboard link -->
    <a class="btn-primary" id="dashboardBtn" href="#" target="_blank">
      Open Signal Dashboard ↗
    </a>

    <!-- Connect account (shown only when not authenticated) -->
    <button class="btn-connect" id="connectBtn" style="display:none;">
      Connect Account
    </button>

    <!-- Settings -->
    <div class="settings">
      <label for="signalUrlInput">Signal URL</label>
      <div class="settings-row">
        <input type="text" id="signalUrlInput" placeholder="https://signal.careers" />
        <button class="btn-save" id="saveBtn">Save</button>
      </div>
      <div class="save-feedback" id="saveFeedback"></div>
    </div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">Signal Career Platform &bull; v1.0.0</footer>

  <script src="popup.js"></script>
</body>
</html>
